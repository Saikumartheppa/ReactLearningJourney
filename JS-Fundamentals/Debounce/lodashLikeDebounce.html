<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lodash-Like Debounce</title>
</head>
<body>
    <input oninput="lodashLikeDebounce(this.value)" placeholder="Search" ></input>
    <button  onclick="lodashLikeDebounce.cancel()" >Cancel</button>
    <button  onclick="lodashLikeDebounce.flush()" >Flush</button>
    <script src="lodashLikeDebounce.js"></script>
</body>
</html>
